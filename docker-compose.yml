services:
  app:
    image: ghcr.io/zacharyab24/pickems-bot:latest
    container_name: pickems-bot
    volumes:
      - ./.env:/app/.env:ro
      - ./config.toml:/app/config.toml:ro
    ports:
      - "8080:8080"
      - "9090:9090"
    restart: unless-stopped

  # Watchtower watches the running containers and restarts them whenever a
  # newer image is available on the registry. It polls every 300 seconds
  # (5 minutes) and removes old images after updating (--cleanup).
  # No credentials needed if the GHCR package is set to public visibility.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8181:8080"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  mongodb-exporter:
    image: percona/mongodb_exporter:0.51
    container_name: mongodb-exporter
    command: --mongodb.uri="mongodb://192.168.1.98:27017"
    ports:
      - "9216:9216"
    restart: unless-stopped

  test-server:
    image: ghcr.io/zacharyab24/pickems-test-server:latest
    ports:
      - "8081:8081"
    profiles:
      - integration
