services:
  app:
    container_name: pickems-bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  test-server:
    image: ghcr.io/zacharyab24/pickems-test-server:latest
    ports:
      - "8081:8081"
    profiles:
      - integration
