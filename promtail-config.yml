server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://192.168.1.132:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["pickems-bot"]

    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: "/(.*)"
      - source_labels: [__meta_docker_container_image]
        target_label: image

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg:   msg
            time:  time
      - labels:
          level:
      - timestamp:
          source: time
          format: RFC3339Nano
